<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Michel Adam电子说明书</title>
<style>
        /* 基础重置与全局样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font: 14px Helvetica, Arial, "Microsoft YaHei", sans-serif; 
            background: #f5f5f5; 
        }
        
        /* 布局容器 */
        .card_body { 
            max-width: 750px; 
            margin: 0 auto; 
            background: #f5f5f5;
        }
        .card_box { 
            background: #fff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            min-height: 100vh;
        }
        
        /* 顶部黑色区域样式 */
        .card_home { background: linear-gradient(135deg, #81D8D0, #0ABAB5); overflow: hidden; }
        .card_home .card_home_line { 
            margin: 20px; 
            border: 1px #fff solid; 
            background: rgba(255,255,255,0.08);
            padding: 10rem 0 6rem 0; 
        }
        .card_home dl { width: 50%; margin: 0 auto; text-align: center; }
        .card_home dl dt { margin-bottom: 5rem; }
        .card_home dl dt img { width: 70%; display: inline-block; }
        .card_home dl dd { margin: 1rem 0; }
        .card_home dl dd a { 
            width: 60%; 
            margin: 0 auto; 
            display: block; 
            font-size: 16px; 
            border: 1px #fff solid; 
            padding: 5px 0; 
            color: #fff; 
            text-align: center; 
            text-decoration: none;
            transition: all 0.3s;
        }
        .card_home dl dd a:hover {
            background: rgba(255,255,255,0.1);
        }
        .card_home p { 
            color: #fff; 
            width: 85%; 
            margin: 0 auto; 
            line-height: 24px; 
            font-size: 12px; 
            margin-top: 8rem; 
            text-align: center; 
            padding-bottom: 20px;
        }
        .card_home p span { font-weight: bold; color: #fff; }

        /* 内容区域样式 */
        .card_box .card_cont .card_cont_line { margin: 20px; border: 1px #eee solid; }
        .card_box .card_cont dl { text-align: center; margin: 3rem auto; }
        .card_box .card_cont dl dt { 
            display: inline-block; 
            font-size: 16px; 
            border: 1px #333 solid; 
            padding: 5px 50px; 
            color: #333;
        }
        .card_box .card_cont p { padding: 5rem 0; text-align: center; border-bottom: 10px #eee solid; }
        .card_box .card_cont p img { width: 100%; height: auto; display: block; }
        
        /* 英文区特殊处理：最后一张图片不显示底边框 */
        .card_box .card_cont #en_box p:last-child { border-bottom: none; }

        /* 新品展示区样式 */
        .product_show{width:100%;padding:20px 0;background:#fff;}
        .product_show_line{margin:0 20px;}
        .product_item{}
        .product_item img{width:100%;height:auto;display:block;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}

        /* 响应式调整 */
        @media (max-width: 750px) {
            .card_home .card_home_line { padding: 5rem 0 3rem 0; }
            .card_home p { margin-top: 4rem; }
            .card_box .card_cont p { padding: 3rem 0; }
        }
    </style>
</head>
<body class="card_body">
<div class="card_box">
